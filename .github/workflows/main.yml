name: Build & Push Spark Image to ECR

on:
  push:
    branches: [master]
    paths:
      - 'spark/**'

permissions:
  contents: write   # required to commit updated yaml back

env:
  AWS_REGION: ap-south-2                      # <-- update to your region
  ECR_REPOSITORY: de-spark-prod               # <-- your ECR repo name
  YAML_DIR: spark-templates                   # folder with yaml files to update

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set short SHA as image tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (access key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: |
          IMAGE_URI="$REGISTRY/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "$IMAGE_URI" -f spark/Dockerfile spark/
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Update image tag in spark_templates yaml
        run: |
          shopt -s nullglob
          files=(${YAML_DIR}/*.yaml ${YAML_DIR}/*.yml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: no yaml files found in ${YAML_DIR}/"
            exit 1
          fi
          for f in "${files[@]}"; do
            echo "--- BEFORE: $f ---"
            grep 'image:' "$f" || true
            sed -i -E "s|(image:[[:space:]]*\")[^\"]+(\")|\1${IMAGE_URI}\2|" "$f"
            echo "--- AFTER: $f ---"
            grep 'image:' "$f" || true
          done

      - name: Debug - show git status before commit
        run: |
          git status
          git diff --stat

      - name: Commit and push updated yaml
        run: |
          shopt -s nullglob
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          files=(${YAML_DIR}/*.yaml ${YAML_DIR}/*.yml)
          git add "${files[@]}"
          if ! git diff --cached --quiet; then
            git commit -m "ci: update spark image to ${{ steps.vars.outputs.IMAGE_TAG }} [skip ci]"
            git push
          else
            echo "No yaml changes to commit"
          fi
